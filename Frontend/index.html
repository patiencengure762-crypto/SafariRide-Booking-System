<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safari Ride Bus Booking</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- HOMEPAGE SECTION -->
    <section id="home-section" class="active-section">
        <div class="overlay"></div>
        <div class="home-content">
            <h1>Welcome to Safari Ride</h1>
            <p>Your trusted partner for comfortable and safe travel across all 47 counties in Kenya. 
               Experience the magic of the savannah while we handle the road.</p>
            <div class="features">
                <div class="feature-item"><i class="fas fa-bus-alt"></i> Modern Fleet</div>
                <div class="feature-item"><i class="fas fa-shield-alt"></i> Safe Travels</div>
                <div class="feature-item"><i class="fas fa-clock"></i> Punctuality</div>
            </div>
            <button id="book-now-btn" class="main-btn">Book A Ride Now</button>
        </div>
    </section>

    <!-- BOOKING SECTION -->
    <section id="booking-section">
        <div class="container">
            <div class="header">
                <button id="back-btn" class="back-btn"><i class="fas fa-arrow-left"></i> Back</button>
                <h2>Booking Details</h2>
            </div>

            <form id="booking-form">
                <!-- Personal Details -->
                <div class="form-group">
                    <label>Passenger Name</label>
                    <input type="text" id="passengerName" placeholder="Enter Full Name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phoneNumber" placeholder="e.g 0712345678" required>
                </div>

                <!-- Route Details -->
                <div class="form-row">
                    <div class="form-group">
                        <label>From (County)</label>
                        <select id="fromCounty" required>
                            <option value="" disabled selected>Select Origin</option>
                            <!-- Options populated by JS -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label>To (County)</label>
                        <select id="toCounty" required>
                            <option value="" disabled selected>Select Destination</option>
                            <!-- Options populated by JS -->
                        </select>
                    </div>
                </div>

                <!-- Travel Details -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Travel Date</label>
                        <input type="date" id="travelDate" required>
                    </div>
                    <div class="form-group">
                        <label>Travel Time</label>
                        <select id="travelTime" required>
                            <option value="" disabled selected>Select Time</option>
                            <!-- Options populated by JS -->
                        </select>
                    </div>
                </div>

                <!-- Bus Details -->
                <div class="form-group">
                    <label>Select Bus</label>
                    <select id="busSelect" required>
                        <option value="" disabled selected>Select Bus</option>
                        <!-- Options populated by JS -->
                    </select>
                </div>

                <div class="form-group">
                    <label>Number of Seats</label>
                    <select id="numSeats" required>
                        <option value="1">1 Seat</option>
                        <option value="2">2 Seats</option>
                        <option value="3">3 Seats</option>
                        <option value="4">4 Seats</option>
                    </select>
                </div>

                <!-- SEAT MAP SIMULATION -->
                <div class="form-group">
                    <label>Select Your Seats (Click on available seats)</label>
                    <p id="seat-instruction">You selected: <span id="selected-seats-display">None</span></p>
                    <div id="seat-map-container">
                        <div class="bus-layout">
                            <div class="driver-area"><i class="fas fa-user"></i> Driver</div>
                            <div id="seat-grid">
                                <!-- 72 Seats generated by JS -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Payment -->
                <div class="form-group">
                    <label>Mode of Payment</label>
                    <select id="paymentMode" required>
                        <option value="Mpesa">M-Pesa</option>
                        <option value="Card">Credit/Debit Card</option>
                        <option value="Cash">Cash on Board</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn">Book & Make Payment</button>
            </form>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
